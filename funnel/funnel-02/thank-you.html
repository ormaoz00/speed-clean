  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 50%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      direction: rtl;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,.08);
      padding: 56px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 96px; height: 96px;
      background: #ecfdf5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
    }
    .icon-wrap svg { color: #10b981; }
    h1 {
      font-size: 32px; font-weight: 800;
      color: #0f172a; line-height: 1.3;
      margin-bottom: 16px;
    }
    .sub {
      font-size: 17px; color: #64748b;
      line-height: 1.7; margin-bottom: 36px;
    }
    .steps {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 28px 24px;
      text-align: right;
      margin-bottom: 32px;
    }
    .steps h3 {
      font-size: 15px; font-weight: 700;
      color: #0f172a; margin-bottom: 16px;
      text-align: center;
    }
    .step {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 10px 0;
    }
    .step:not(:last-child) { border-bottom: 1px solid #e2e8f0; }
    .step-num {
      width: 28px; height: 28px; flex-shrink: 0;
      background: #0ea5e9; color: #fff;
      border-radius: 50%; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .step-text { font-size: 15px; color: #334155; line-height: 1.5; }
    .step-text strong { color: #0f172a; }
    .btn-home {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 14px 28px;
      background: transparent; color: #64748b;
      border: 1.5px solid #e2e8f0; border-radius: 12px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      text-decoration: none; transition: all .2s;
    }
    .btn-home:hover { background: #f8fafc; color: #334155; border-color: #cbd5e1; }
    @media (max-width: 480px) {
      .card { padding: 40px 24px; }
      h1 { font-size: 26px; }
    }

        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>

    <h1>תודה רבה!<br />הפנייה התקבלה בהצלחה</h1>

    <p class="sub">הצוות של ספיד קלין קיבל את הפרטים שלכם ויחזור אליכם בהקדם לתיאום מועד הניקוי.</p>

    <div class="steps">
      <h3>מה קורה עכשיו?</h3>
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text"><strong>נחזור אליכם תוך 30 דקות</strong> בשעות הפעילות (א'–ו', 08:00–19:00)</div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text"><strong>נתאם מועד</strong> שנוח לכם לביקור הטכנאי</div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text"><strong>הטכנאי מגיע</strong> עם כל הציוד — ניקוי מקצועי עם אחריות מלאה</div>
      </div>
    </div>

    <a href="/v2" class="btn-home">חזרה לדף הבית</a>
  </div>
